name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # 这一步很关键

      - name: Install Git LFS
        run: git lfs install

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 彻底清空本地 Git 状态，只保留当前文件内容
          rm -rf .git
          git init
          
          # 2. 配置身份
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 3. 重新添加所有文件（此时图片已经被你删了，所以很干净）
          git add .
          git commit -m "Pure deploy without binary history"

          # 4. 强制覆盖 Hugging Face 的仓库
          # 请确保用户名 wotmlaila 和项目名 metapi 正确
          git push -f https://wotmlaila:$HF_TOKEN@huggingface.co/spaces/wotmlaila/metapi HEAD:main
